<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>CS 4731 Final Project Part I</title>
        <script id="vshader" type="x-shader/x-vertex">

            attribute vec4 vPosition;
            varying vec3 fPosition;
            attribute vec3 vNormal;
            varying vec3 fNormal;
            attribute vec2 vTexCoord;
            varying vec2 fTexCoord;

            uniform mat4 modelMatrix;
            uniform mat4 viewMatrix;
            uniform mat4 projectionMatrix;

            void main() {

                vec4 worldPos = modelMatrix * vPosition;
                fPosition = worldPos.xyz;

                fNormal = normalize(mat3(modelMatrix) * vNormal);

                fTexCoord = vTexCoord;
                gl_Position = projectionMatrix * viewMatrix * worldPos;
            }
        </script>

        <script id="fshader" type="x-shader/x-fragment">

            precision mediump float;

            varying vec3 fPosition;
            varying vec3 fNormal;

            uniform vec3 lightPosition;

            varying vec2 fTexCoord;
            uniform sampler2D texture;
            uniform bool useTexture; 

            void main() {

                if (useTexture) {

                    gl_FragColor = texture2D(texture, fTexCoord);
                } 
                else {

                    //Ambient lighting
                    float ambient = 0.3;

                    //Diffuse lighting
                    vec3 L = normalize(lightPosition - fPosition);
                    vec3 N = normalize(fNormal);
                    float diffuse = max(dot(L, N), 0.0);

                    float totalLight = ambient + diffuse;
                    gl_FragColor = vec4(vec3(0.4, 0.2, 0.1) * totalLight, 1.0);
                }
            }
        </script>

        <script type="text/javascript" src="lib/webgl-utils.js"></script>
        <script type="text/javascript" src="lib/initShaders.js"></script>
        <script type="text/javascript" src="lib/MV.js"></script>

        <script type="text/javascript" src="lib/model.js"></script>
        <script type="text/javascript" src="lib/face.js"></script>
        <script type="text/javascript" src="main.js"></script>

    </head>

    <body onload="main()">
        <h1 id="mode">CS 4731 Final Project</h1>

        <canvas id="webgl" class="box" width="512" height="512">
            Please use a browser that supports the "canvas" tag.
        </canvas>
    </body>
</html>
